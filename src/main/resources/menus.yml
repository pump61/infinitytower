# ============================================================
# InfinityTower - menus.yml
# Contém: player_stats_menu, menus (solo/party)
#
# OBS: o menu principal (/tower menu) NÃO é configurado aqui — ele usa
# a seção "main-menu" (ou "main_menu") do config.yml.
# ============================================================

# ------------------------------------------------------------
# PLAYER STATS MENU (estatísticas do jogador, /tower stats)
# Placeholders disponíveis em title/name/lore de qualquer item:
# {player} {uuid}
# {soloRuns} {soloWins} {soloLosses}
# {partyRuns} {partyWins} {partyLosses}
# {totalRuns} {totalWins} {totalLosses}
#
# "items" aceita qualquer quantidade de entradas (não só solo/party/total) —
# cada uma vira um item no slot configurado.
# ------------------------------------------------------------
player_stats_menu:
  enabled: true
  size: 27
  title: "&8Suas Estatísticas"

  filler:
    enabled: false
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "
    lore: []
    custom_model_data: 0

  items:
    solo:
      enabled: true
      slot: 11
      material: "DIAMOND_SWORD"
      name: "&a&lSOLO"
      lore:
        - ""
        - "&7Entradas: &f{soloRuns}"
        - "&7Vitórias: &a{soloWins}"
        - "&7Derrotas: &c{soloLosses}"
      custom_model_data: 0

    total:
      enabled: true
      slot: 13
      material: "BOOK"
      name: "&6&lGERAL"
      lore:
        - ""
        - "&7Entradas: &f{totalRuns}"
        - "&7Vitórias: &a{totalWins}"
        - "&7Derrotas: &c{totalLosses}"
      custom_model_data: 0

    party:
      enabled: true
      slot: 15
      material: "GOLDEN_SWORD"
      name: "&6&lPARTY"
      lore:
        - ""
        - "&7Entradas: &f{partyRuns}"
        - "&7Vitórias: &a{partyWins}"
        - "&7Derrotas: &c{partyLosses}"
      custom_model_data: 0


# ------------------------------------------------------------
# DUNGEON MENUS (SOLO / PARTY)
# Placeholders:
# {player} {online} {max_online}
# {id} {display} {mode} {max_floors}
# ------------------------------------------------------------
menus:
  solo:
    title: "&8Torres Solo"
    size: 27

    filler:
      enabled: true
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "
      lore: []
      custom_model_data: 0
      hide_attributes: true

    static-items:
      info:
        enabled: true
        slot: 4
        material: "BOOK"
        name: "&e&lINFORMAÇÕES"
        lore:
          - ""
          - "&7Escolha um desafio solo."
        hide_attributes: true

    leave:
      enabled: true
      slot: 22
      material: "BARRIER"
      name: "&c&lSAIR"
      lore:
        - "&7Clique para fechar."
      hide_attributes: true

    dungeon-slots:
      - 10
      - 11
      - 12
      - 13
      - 14
      - 15
      - 16

    dungeon-item:
      material: "ENDER_EYE"
      amount: 1
      name: "&a&l{display}"
      lore:
        - ""
        - "&7Modo: &f{mode}"
        - "&7Andares: &f{max_floors}"
        - ""
        - "&eClique para entrar!"
      custom_model_data: 0
      hide_attributes: true


  party:
