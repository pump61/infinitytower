# ------------------------------------------------------------
# PLAYER STATS MENU (estatísticas do jogador)
# Placeholders:
# {player}
# {soloRuns} {soloWins} {soloLosses}
# {partyRuns} {partyWins} {partyLosses}
# ------------------------------------------------------------
player_stats_menu:
  enabled: true
  size: 27
  title: "&8Suas Estatísticas"

  filler:
    enabled: false
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "
    lore: []
    custom_model_data: 0

  items:
    solo:
      enabled: true
      slot: 11
      material: "DIAMOND_SWORD"
      name: "&a&lSOLO"
      lore:
        - ""
        - "&7Entradas: &f{soloRuns}"
        - "&7Vitórias: &a{soloWins}"
        - "&7Derrotas: &c{soloLosses}"
      custom_model_data: 0

    party:
      enabled: true
      slot: 15
      material: "GOLDEN_SWORD"
      name: "&6&lPARTY"
      lore:
        - ""
        - "&7Entradas: &f{partyRuns}"
        - "&7Vitórias: &a{partyWins}"
        - "&7Derrotas: &c{partyLosses}"
      custom_model_data: 0


