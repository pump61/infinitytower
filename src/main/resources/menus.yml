    size: 27

    filler:
      enabled: true
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "
      lore: []
      custom_model_data: 0
      hide_attributes: true

    static-items:
      info:
        enabled: true
        slot: 4
        material: "BOOK"
        name: "&6&lINFORMAÇÕES"
        lore:
          - ""
          - "&7Escolha um desafio em party."
        hide_attributes: true

    leave:
      enabled: true
      slot: 22
      material: "BARRIER"
      name: "&c&lSAIR"
      lore:
        - "&7Clique para fechar."
      hide_attributes: true

    dungeon-slots:
      - 10
      - 11
      - 12
      - 13
      - 14
      - 15
      - 16

    dungeon-item:
      material: "ENDER_EYE"
      amount: 1
      name: "&e&l{display}"
      lore:
        - ""
        - "&7Modo: &f{mode}"
        - "&7Andares: &f{max_floors}"
        - ""
        - "&eClique para entrar!"
      custom_model_data: 0
      hide_attributes: true