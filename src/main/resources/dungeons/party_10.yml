display: "&bTorre Party"
max_floors: 10
mode: PARTY
allow_solo_in_party: true
next_floor_delay_seconds: 5
allow_empty_floors: false
start_delay_seconds: 10

titles:
  preparing:
    title: "&#00FF7FPrepare-se!"
    subtitle: "&#FFD700A primeira orda começa em &#FFFFFF{delay}&#FFD700 segundos!"
  on_enter:
    title: "&#00FF7FTorre Infinita"
    subtitle: "&#BEBEBEPrepare-se para a primeira orda!"
  floor_cleared:
    title: "&#BEBEBEAndar &#8B0000{floor}&#BEBEBE Concluído!"
    subtitle: "&#FFD700Iniciando próximo andar em &#FFFFFF{delay}&#FFD700 segundos!"
  completed:
    title: "&#00FF7F{dungeon} Concluída!"
    subtitle: "&#BEBEBEVoltando ao spawn..."

menu-item:
  material: PAPER
  custom-model-data: 10133
  name: "&b{display}"
  lore:
    - "&7ID: &f{id}"
    - "&7Andares: &f{max_floors}"
    - ""
    - "&eClique para entrar!"

access:
  require_key: true
  consume_key: true
  key:
    material: PAPER
    custom-model-data: 10133
    name: "&bChave da {display}"
    lore:
      - ""
      - "&7Acesso: &f{id}"
      - "&7Andares: &f{max_floors}"
      - ""
      - "&eUse para entrar!"
    glow: true

  limiter:
    enabled: false
    cooldown_seconds: 0
    max_entries_per_day: 0

player_spawns:
  - world: world
    x: -47.5
    y: 167.0
    z: 45.5
    yaw: 0.0
    pitch: 0.0

