display: "&bTorre Party"
max_floors: 10
mode: PARTY
allow_solo_in_party: true
next_floor_delay_seconds: 5
allow_empty_floors: false
start_delay_seconds: 10

titles:
  preparing:
    title: "&#00FF7FPrepare-se!"
    subtitle: "&#FFD700A primeira orda começa em &#FFFFFF{delay}&#FFD700 segundos!"
  on_enter:
    title: "&#00FF7FTorre Infinita"
    subtitle: "&#BEBEBEPrepare-se para a primeira orda!"
  floor_cleared:
    title: "&#BEBEBEAndar &#8B0000{floor}&#BEBEBE Concluído!"
    subtitle: "&#FFD700Iniciando próximo andar em &#FFFFFF{delay}&#FFD700 segundos!"
  completed:
    title: "&#00FF7F{dungeon} Concluída!"
    subtitle: "&#BEBEBEVoltando ao spawn..."

menu-item:
  material: PAPER
  custom-model-data: 10133
  name: "&b{display}"
  lore:
    - "&7ID: &f{id}"
    - "&7Andares: &f{max_floors}"
    - ""
    - "&eClique para entrar!"

access:
  require_key: true
  consume_key: true
  key:
    material: PAPER
    custom-model-data: 10133
    name: "&bChave da {display}"
    lore:
      - ""
      - "&7Acesso: &f{id}"
      - "&7Andares: &f{max_floors}"
      - ""
      - "&eUse para entrar!"
    glow: true

  limiter:
    enabled: false
    cooldown_seconds: 0
    max_entries_per_day: 0

player_spawns:
  - world: world
    x: -47.5
    y: 167.0
    z: 45.5
    yaw: 0.0
    pitch: 0.0

return_spawn:
  world: world
  x: -47.5
  y: 167.0
  z: 45.5
  yaw: 0.0
  pitch: 0.0

floors:
  # floors.<n>.floor_spawn (opcional, em qualquer andar): teleporta a party inteira
  # pra um local diferente só nesse andar, em vez de manter o spawn de entrada.
  # Serve pra simular "subir de andar" trocando de sala/arena fisicamente.
  # Usa o mesmo formato de "return_spawn". Pra reconfigurar com coordenadas reais:
  #   /tower admin setup party_10
  #   /tower admin setfloorspawn <floor>   (fica em pé no local e roda)
  #   /tower admin save
  #
  # ATIVADO ABAIXO como exemplo, alternando entre 2 pontos: "arena A" (o
  # player_spawns/return_spawn de sempre) e "arena B" (ponto de exemplo,
  # mesmo usado no solo_10.yml) — são coordenadas de EXEMPLO, ajuste pras
  # arenas reais que você construir (e ajuste também floors.<n>.mobs[].spawns
  # de cada andar pra combinar com o floor_spawn dele).

  1:
    floor_spawn: { world: world, x: -47.5, y: 167.0, z: 45.5 }   # "arena A"
    mobs:
      - type: ZOMBIE
        amount: 3
        # equipment: opcional, só vale para mobs vanilla (type). Slots: hand, offhand, helmet, chestplate, leggings, boots
        # cada slot aceita "MATERIAL" simples ou { material: MATERIAL, enchantments: { nome: nivel } }
        equipment:
          hand:
            material: DIAMOND_SWORD
            enchantments:
              sharpness: 5
          helmet:
            material: DIAMOND_HELMET
            enchantments:
              protection: 4
          chestplate:
            material: DIAMOND_CHESTPLATE
            enchantments:
              protection: 4
          leggings:
            material: DIAMOND_LEGGINGS
            enchantments:
              protection: 4
          boots:
            material: DIAMOND_BOOTS
            enchantments:
              protection: 4
        spawns:
          - world: world
            x: -52.5
            y: 167.0
            z: 39.5
          - world: world
            x: -52.5
            y: 167.0
            z: 39.5
          - world: world
            x: -54.5
            y: 167.0
            z: 39.5
    rewards:
      enabled: true
      items:
        - type: DIAMOND
          amount: 1

  2:
    floor_spawn: { world: world, x: 0.5, y: 100.0, z: 0.5 }   # "arena B"
    mobs:
      - mythic: SkeletalKnight
        amount: 3
        spawns:
          - world: world
            x: -52.5
            y: 167.0
            z: 39.5
    rewards:
      enabled: true
      commands:
        - "give {player} emerald 2"

  3:
    floor_spawn: { world: world, x: -47.5, y: 167.0, z: 45.5 }   # "arena A"
    mobs:
      - mythic: SkeletonKing
        amount: 1
        spawns:
          - world: world
            x: -52.5
            y: 167.0
            z: 39.5
    rewards:
      enabled: true
      commands:
        - "give {player} diamond 5"

  4:
    floor_spawn: { world: world, x: 0.5, y: 100.0, z: 0.5 }   # "arena B"
    mobs:
      - mythic: SkeletalKnight
        amount: 5
